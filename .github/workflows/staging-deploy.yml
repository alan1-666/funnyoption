name: staging-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref or commit SHA to deploy. Defaults to the workflow SHA.
        required: false
        type: string
      deploy_scope:
        description: Use full to force --all-services, or selective to diff against the current deployed HEAD.
        required: false
        default: selective
        type: choice
        options:
          - selective
          - full

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: self-hosted
    environment: staging
    env:
      STAGING_DEPLOY_ENTRYPOINT: /usr/local/bin/funnyoption-staging-deploy
      STAGING_DEPLOY_REPO: /opt/funnyoption-staging
    steps:
      - name: Resolve deploy request
        id: deploy-request
        shell: bash
        env:
          DEPLOY_REF_INPUT: ${{ github.event.inputs.deploy_ref }}
          DEPLOY_SCOPE_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_scope || 'selective' }}
        run: |
          if [[ -n "${DEPLOY_REF_INPUT}" ]]; then
            deploy_ref="${DEPLOY_REF_INPUT}"
          else
            deploy_ref="${{ github.sha }}"
          fi

          if [[ "${DEPLOY_SCOPE_INPUT}" == "full" ]]; then
            deploy_scope="full"
          else
            deploy_scope="selective"
          fi

          printf 'deploy_ref=%s\n' "${deploy_ref}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_scope=%s\n' "${deploy_scope}" >> "${GITHUB_OUTPUT}"

      - name: Run server-side deploy
        shell: bash
        env:
          DEPLOY_REF: ${{ steps.deploy-request.outputs.deploy_ref }}
          DEPLOY_SCOPE: ${{ steps.deploy-request.outputs.deploy_scope }}
          STAGING_DEPLOY_ENTRYPOINT: ${{ env.STAGING_DEPLOY_ENTRYPOINT }}
          STAGING_DEPLOY_REPO: ${{ env.STAGING_DEPLOY_REPO }}
        run: |
          set -euo pipefail

          cmd=("${STAGING_DEPLOY_ENTRYPOINT}" --repo "${STAGING_DEPLOY_REPO}" --ref "${DEPLOY_REF}")

          if [[ "${DEPLOY_SCOPE}" == "full" ]]; then
            cmd+=(--all-services)
          fi

          echo "triggering ${DEPLOY_SCOPE} staging deploy for ${DEPLOY_REF}"
          "${cmd[@]}"
