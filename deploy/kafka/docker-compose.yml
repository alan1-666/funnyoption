services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.15
    container_name: funnyoption-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://127.0.0.1:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=127.0.0.1:8082
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - funnyoption_kafka_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  funnyoption_kafka_data:
