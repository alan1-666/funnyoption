# Patroni health: GET /primary (leader only) and GET /replica (standbys only).
# Replace server IPs if your nodes differ.
global
    maxconn 10000
    log stdout format raw local0

defaults
    mode tcp
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    option tcplog
    option dontlognull

listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

listen pg_primary
    bind *:5000
    balance first
    option httpchk
    http-check send meth GET uri /primary ver HTTP/1.1 hdr Host localhost hdr Connection close
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server s1 76.13.220.236:5432 check port 8008
    server s2 117.72.160.220:5432 check port 8008
    server s3 118.193.33.87:5432 check port 8008

listen pg_replicas
    bind *:5001
    balance roundrobin
    option httpchk
    http-check send meth GET uri /replica ver HTTP/1.1 hdr Host localhost hdr Connection close
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server s1 76.13.220.236:5432 check port 8008
    server s2 117.72.160.220:5432 check port 8008
    server s3 118.193.33.87:5432 check port 8008
