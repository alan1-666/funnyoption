name: funnyoption-staging

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: funnyoption
      POSTGRES_USER: funnyoption
      POSTGRES_PASSWORD: ${FUNNYOPTION_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funnyoption -d funnyoption"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.15
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    volumes:
      - kafka-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 10s
      retries: 12

  migrate:
    image: postgres:16
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.staging
    working_dir: /workspace
    volumes:
      - ../../:/workspace:ro
    command:
      - /bin/sh
      - -ec
      - |
        for file in /workspace/backend/migrations/*.sql; do
          echo "applying $${file}"
          psql "$$FUNNYOPTION_POSTGRES_DSN" -v ON_ERROR_STOP=1 -f "$$file"
        done

  account:
    build:
      context: ../..
      dockerfile: deploy/docker/account.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_ACCOUNT_GRPC_ADDR: :9091
      FUNNYOPTION_ACCOUNT_HTTP_ADDR: :8091
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  matching:
    build:
      context: ../..
      dockerfile: deploy/docker/matching.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_MATCHING_GRPC_ADDR: :9090
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:9190/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ledger:
    build:
      context: ../..
      dockerfile: deploy/docker/ledger.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_LEDGER_GRPC_ADDR: :9095
      FUNNYOPTION_LEDGER_HTTP_ADDR: :8095
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8095/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  settlement:
    build:
      context: ../..
      dockerfile: deploy/docker/settlement.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_SETTLEMENT_GRPC_ADDR: :9093
      FUNNYOPTION_SETTLEMENT_HTTP_ADDR: :8093
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8093/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  chain:
    build:
      context: ../..
      dockerfile: deploy/docker/chain.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_CHAIN_GRPC_ADDR: :9094
      FUNNYOPTION_CHAIN_HTTP_ADDR: :8094
      FUNNYOPTION_ACCOUNT_GRPC_ADDR: account:9091
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8094/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  oracle:
    build:
      context: ../..
      dockerfile: deploy/docker/oracle.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_ORACLE_HTTP_ADDR: :9191
    ports:
      - "127.0.0.1:9191:9191"
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:9191/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_API_HTTP_ADDR: :8080
      FUNNYOPTION_ACCOUNT_GRPC_ADDR: account:9091
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ws:
    build:
      context: ../..
      dockerfile: deploy/docker/ws.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_WS_HTTP_ADDR: :8081
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification:
    build:
      context: ../..
      dockerfile: deploy/docker/notification.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_NOTIFICATION_HTTP_ADDR: :8096
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8096/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  market-maker:
    build:
      context: ../..
      dockerfile: deploy/docker/market-maker.Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - ./.env.staging
    environment:
      FUNNYOPTION_MARKET_MAKER_HTTP_ADDR: :8097
    healthcheck:
      test: ["CMD", "/app/healthcheck", "http://localhost:8097/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${FUNNYOPTION_PUBLIC_WEB_BASE_URL}
        NEXT_PUBLIC_WS_BASE_URL: ${FUNNYOPTION_PUBLIC_WEB_BASE_URL}
        NEXT_PUBLIC_ADMIN_BASE_URL: ${FUNNYOPTION_PUBLIC_ADMIN_BASE_URL}
        NEXT_PUBLIC_CHAIN_ID: ${FUNNYOPTION_CHAIN_ID}
        NEXT_PUBLIC_CHAIN_NAME: ${FUNNYOPTION_FRONTEND_CHAIN_NAME}
        NEXT_PUBLIC_VAULT_ADDRESS: ${FUNNYOPTION_VAULT_ADDRESS}
        NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS: ${FUNNYOPTION_COLLATERAL_TOKEN_ADDRESS}
        NEXT_PUBLIC_COLLATERAL_SYMBOL: ${FUNNYOPTION_COLLATERAL_SYMBOL}
        NEXT_PUBLIC_COLLATERAL_DECIMALS: ${FUNNYOPTION_COLLATERAL_DECIMALS}
        NEXT_PUBLIC_COLLATERAL_ACCOUNTING_DECIMALS: ${FUNNYOPTION_COLLATERAL_ACCOUNTING_DECIMALS}
        NEXT_PUBLIC_CHAIN_EXPLORER_URL: ${FUNNYOPTION_CHAIN_EXPLORER_URL}
        NEXT_PUBLIC_CHAIN_RPC_URL: ${FUNNYOPTION_CHAIN_RPC_URL}
        NEXT_PUBLIC_NATIVE_CURRENCY_NAME: ${FUNNYOPTION_NATIVE_CURRENCY_NAME}
        NEXT_PUBLIC_NATIVE_CURRENCY_SYMBOL: ${FUNNYOPTION_NATIVE_CURRENCY_SYMBOL}
        NEXT_PUBLIC_NATIVE_CURRENCY_DECIMALS: ${FUNNYOPTION_NATIVE_CURRENCY_DECIMALS}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

  admin:
    build:
      context: ../..
      dockerfile: deploy/docker/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${FUNNYOPTION_PUBLIC_WEB_BASE_URL}
        NEXT_PUBLIC_WS_BASE_URL: ${FUNNYOPTION_PUBLIC_WEB_BASE_URL}
        NEXT_PUBLIC_PUBLIC_WEB_BASE_URL: ${FUNNYOPTION_PUBLIC_WEB_BASE_URL}
        NEXT_PUBLIC_DEFAULT_OPERATOR_USER_ID: ${FUNNYOPTION_DEFAULT_OPERATOR_USER_ID}
        NEXT_PUBLIC_OPERATOR_WALLETS: ${FUNNYOPTION_OPERATOR_WALLETS}
        NEXT_PUBLIC_CHAIN_ID: ${FUNNYOPTION_CHAIN_ID}
        NEXT_PUBLIC_CHAIN_NAME: ${FUNNYOPTION_FRONTEND_CHAIN_NAME}
        NEXT_PUBLIC_CHAIN_RPC_URL: ${FUNNYOPTION_CHAIN_RPC_URL}
        NEXT_PUBLIC_CHAIN_EXPLORER_URL: ${FUNNYOPTION_CHAIN_EXPLORER_URL}
        NEXT_PUBLIC_COLLATERAL_SYMBOL: ${FUNNYOPTION_COLLATERAL_SYMBOL}
        NEXT_PUBLIC_COLLATERAL_ACCOUNTING_DECIMALS: ${FUNNYOPTION_COLLATERAL_ACCOUNTING_DECIMALS}
        NEXT_PUBLIC_NATIVE_CURRENCY_NAME: ${FUNNYOPTION_NATIVE_CURRENCY_NAME}
        NEXT_PUBLIC_NATIVE_CURRENCY_SYMBOL: ${FUNNYOPTION_NATIVE_CURRENCY_SYMBOL}
        NEXT_PUBLIC_NATIVE_CURRENCY_DECIMALS: ${FUNNYOPTION_NATIVE_CURRENCY_DECIMALS}
        FUNNYOPTION_DEFAULT_OPERATOR_USER_ID: ${FUNNYOPTION_DEFAULT_OPERATOR_USER_ID}
        FUNNYOPTION_OPERATOR_WALLETS: ${FUNNYOPTION_OPERATOR_WALLETS}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./.env.staging
    ports:
      - "127.0.0.1:3001:3001"

volumes:
  postgres-data:
  redis-data:
  kafka-data:
