services:
  postgres:
    image: postgres:16
    container_name: funnyoption-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-funnyoption}
      POSTGRES_USER: ${POSTGRES_USER:-funnyoption}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-funnyoption}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - funnyoption_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  funnyoption_pgdata:
