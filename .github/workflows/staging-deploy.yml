name: staging-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref or commit SHA to deploy. Defaults to the workflow SHA.
        required: false
        type: string
      deploy_scope:
        description: Use full to force --all-services, or selective to diff against the current deployed HEAD.
        required: false
        default: selective
        type: choice
        options:
          - selective
          - full

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_DEPLOY_ENTRYPOINT: /usr/local/bin/funnyoption-staging-deploy
      STAGING_DEPLOY_REPO: /opt/funnyoption-staging
    steps:
      - name: Resolve deploy request
        id: deploy-request
        shell: bash
        env:
          DEPLOY_REF_INPUT: ${{ github.event.inputs.deploy_ref }}
          DEPLOY_SCOPE_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_scope || 'selective' }}
        run: |
          if [[ -n "${DEPLOY_REF_INPUT}" ]]; then
            deploy_ref="${DEPLOY_REF_INPUT}"
          else
            deploy_ref="${{ github.sha }}"
          fi

          if [[ "${DEPLOY_SCOPE_INPUT}" == "full" ]]; then
            deploy_scope="full"
          else
            deploy_scope="selective"
          fi

          printf 'deploy_ref=%s\n' "${deploy_ref}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_scope=%s\n' "${deploy_scope}" >> "${GITHUB_OUTPUT}"

      - name: Validate required secrets
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          [[ -n "${STAGING_SSH_HOST}" ]] || { echo "missing STAGING_SSH_HOST"; exit 1; }
          [[ -n "${STAGING_SSH_USER}" ]] || { echo "missing STAGING_SSH_USER"; exit 1; }
          [[ -n "${STAGING_SSH_PRIVATE_KEY}" ]] || { echo "missing STAGING_SSH_PRIVATE_KEY"; exit 1; }

      - name: Configure SSH
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT || '22' }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${STAGING_SSH_PRIVATE_KEY}" > ~/.ssh/funnyoption_staging
          chmod 600 ~/.ssh/funnyoption_staging
          if [[ -n "${STAGING_SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${STAGING_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -T 10 -p "${STAGING_SSH_PORT}" "${STAGING_SSH_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Trigger server-side staging deploy
        shell: bash
        env:
          DEPLOY_REF: ${{ steps.deploy-request.outputs.deploy_ref }}
          DEPLOY_SCOPE: ${{ steps.deploy-request.outputs.deploy_scope }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT || '22' }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_DEPLOY_ENTRYPOINT: ${{ env.STAGING_DEPLOY_ENTRYPOINT }}
          STAGING_DEPLOY_REPO: ${{ env.STAGING_DEPLOY_REPO }}
        run: |
          deploy_ref_q="$(printf '%q' "${DEPLOY_REF}")"
          entrypoint_q="$(printf '%q' "${STAGING_DEPLOY_ENTRYPOINT}")"
          repo_q="$(printf '%q' "${STAGING_DEPLOY_REPO}")"

          remote_command="set -euo pipefail"
          remote_command+="; ${entrypoint_q} --repo ${repo_q} --ref ${deploy_ref_q}"

          if [[ "${DEPLOY_SCOPE}" == "full" ]]; then
            remote_command+=" --all-services"
          fi

          echo "triggering ${DEPLOY_SCOPE} staging deploy for ${DEPLOY_REF}"

          ssh \
            -i ~/.ssh/funnyoption_staging \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${STAGING_SSH_PORT}" \
            "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" \
            "${remote_command}"
